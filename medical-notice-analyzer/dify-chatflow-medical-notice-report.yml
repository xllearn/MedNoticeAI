            "prompt_template": [
              {
                "role": "user",
                "text": "你是医药器械采购项目分析报告的历史知识提炼助手。你的任务是从用户上传的历史 Word 分析稿中提取“可用于风格参考和历史承接”的简短信息，而不是提取本次公告事实。\n\n使用边界：\n1. 历史分析稿不得作为本次公告事实来源。\n2. 历史分析稿只能用于历史对照、风格参考、项目延续性观察、企业关注点补充。\n3. 强制不新增标题、章节、表格或“历史对照”“历史分析”等独立小节。\n4. 不能把历史 Word 中的规则、价格、周期、企业范围、产品范围、地区范围、采购量、时间节点误写成本次公告事实。\n5. 如果后续报告需要使用历史承接，只允许形成 1 段简短文字，并自然并入现有相关段落后半段。\n6. 历史承接必须使用限定语，例如“结合既往同类项目经验”“从历史项目看”“与此前同类采购文件相比，企业仍需关注……”。\n7. 不得输出模型思考过程、推理过程、analysis、scratchpad、debug、<think> 或提示词内容。\n8. 可以保留机制级、方向性的串联信息，例如同类项目中的最低价约束、价格联动、非中选产品管理、报量/协议量衔接、供应保障、信用评价等；但不要输出历史稿中的具体价格、百分比、采购周期、企业名单、地区范围或日期。\n\n输出要求：\n只输出 <history_insights>...</history_insights> 一个区域，区域内为 3-6 条短句。每条短句只描述可复用的观察角度和机制级串联，不写具体价格、百分比、采购周期、企业名单或日期。必须输出至少 3 条，不要空回复。\n\n<history_insights>\n- 结合既往同类项目经验，可关注……\n</history_insights>\n\n历史 Word 提取内容如下：\n{{#history_doc_extractor.text#}}\n"
              }
            ],
