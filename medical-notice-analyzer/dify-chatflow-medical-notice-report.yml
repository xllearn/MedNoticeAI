                "text": "请根据以下公告正文、采购文件和附件内容，生成一份医药器械采购项目分析报告。\n\n要求：\n1. 报告风格参考人工行业分析稿，语言专业、自然、重点突出。\n2. 必须严格基于输入材料生成，不要编造原文未披露的信息。\n3. 不要固定写成五个部分，不要机械编号。\n4. 请先判断公告类型，并在 report_ir.notice_type 中输出；但不要在报告正文中展示“公告类型：xxx”。\n5. 发布日期、发布主体、文件名称、采购周期等应自然写入导语，不要生成机械元信息行。\n6. 按公告和采购文件原文逻辑自然拆分小标题。\n7. 对采购文件类报告，规则完整优先于短。不要为了简洁省略规则分支。\n8. 表格按类别拆分，只在必要时使用，不要把所有信息塞进一个大表。\n9. 如果原文或附件包含大表、产品清单、价格表，请优先提取附件名称、产品条数、产品分类、价格差异、来源省份、处理要求和企业后果。\n10. 对企业排名、占比、涨幅、合计等内容必须说明口径。\n11. 如果是根据原文数据计算的结果，应说明“按表内数据测算”或“计算值”。\n12. 重点规则句可以放入 highlights。\n13. 企业关注点要简短克制，不要写成咨询报告。\n14. 不要输出思考过程。\n15. 不要输出水印相关内容。\n16. 不要生成临时声明；report_ir.disclaimer 可以留空，Word 导出层会统一添加固定“声  明”。\n17. 只输出 <report_ir> 结构化 JSON，不要输出 <final_report> 或 Markdown 正文；Dify 展示正文将由后端根据 ReportIR 渲染。\n18. report_ir.suggested_filename 必须生成，作为后续 Word 下载文件名使用，不带 .docx。\n19. report_ir.enterprise_tips 必须是字符串数组，例如 [\"企业需关注申报入口变化。\"]；不要输出对象数组，例如 [{\"tip\":\"企业需关注申报入口变化。\"}]。\n19a. JSON 必须可被严格解析。所有字符串内部如需引用术语，请优先使用中文引号“……”或书名号《……》；不要在字符串内部直接使用未转义的英文半角双引号 \"。如必须使用半角双引号，必须写成 \\\"。\n20. 如果提供 history_insights，只能把它作为历史承接和风格参考，不能作为本次公告事实来源；不得新增历史标题、章节或表格；不能把历史 Word 中的规则、价格、周期、企业范围、产品范围、地区范围、采购量、时间节点误写成本次公告事实。\n21. 历史承接最多 1 段，并自然并入现有相关段落后半段；没有 history_insights 时不要提及历史分析稿。\n22. 对挂网流程调整类公告，只有输入材料明确提供外部政策背景、历史同类稿或其他省份动态时，才可写入相关背景；材料没有提供时不得自行补充省份案例、全国趋势或政策背景。\n\n23. 证据丰富时不要写成短摘要；采购文件类或附件规则丰富的报告，正文通常不少于 1800 字，建议 1800-2600 字，并应包含导语、关键规则小节、必要分主题表格和企业关注点。\n24. 若原文或附件提供表格，需保留表格标题、表头、关键数值、单位和备注口径；不要把多个规则表压成一段泛泛总结。\n25. 价格表格必须优先保持附件原始表格口径：如果附件表头已经写明“价格（元）”“挂网价格（元）”“全国较低价格（元）”等单位，ReportIR 表格 cell 中优先填写原始数字（如 58、65、47），不要再写成“58元”“65元”“47元”；单位放在表头或备注中。\n26. 不要把多个型号、多个注册证或多行价格自行合并成“58元或65元（依型号而定）”“34个为58元、15个为65元”等统计或概括，除非附件原文直接披露该统计，或报告明确写明逐行测算口径并且证据中有完整可核验的行；不满足时只展示少量逐行原始样例，或写“具体价格详见附件清单”。\n\n规则完整性要求：\n如果输入材料出现采购品种范围、产品分类、最高有效申报价、参考价、企业报价要求、有效报价、拟中选产品确定、中选产品确定、协议采购量、首年协议采购量、采购执行、价格联动、非中选产品管理、新获批产品管理、名词解释、带量最低价、非带量最低价、非中选产品、申报材料、配送要求、信用评价、失信约束、取消中选资格、暂不予挂网等内容，应尽量保留为独立小节或分主题表格。\n\n非中选产品管理：\n只要原文出现“非中选产品”，必须单独生成“非中选产品管理”章节，并尽量区分已中选注册证的非中选产品、不属于已中选注册证的非中选产品、特殊品种或特殊规格的非中选产品、是否可作为中选产品挂网采购、是否共享协议采购量、是否无协议采购量、不符合要求的处理方式。\n\n名词解释：\n如果原文出现名词定义，必须保留“名词解释”章节，尽量忠实摘录原文。常见定义包括带量最低价、非带量最低价、中选产品、非中选产品、地区最低价、报价单元、同采购品种同类别同注册证、参考价。每一个名词解释必须单独成为一个 paragraph，并使用阿拉伯数字序号，格式为“1. 带量最低价：指……”“2. 非带量最低价：指……”。不要把多个名词解释合并在同一段。\n\n候选表格：\n1. 采购品种及价格门槛表：采购品种、类别、类别名称、最高有效申报价/参考价、备注。\n2. 报价规则表：采购品种、情形、报价单元、报价单位、有效报价条件。\n3. 拟中选规则表：采购品种、情形、拟中选条件、拟中选价格确定方式。\n4. 非中选产品管理表：产品类型、适用情形、挂网或中选产品身份条件、协议采购量安排。\n5. 关键执行要求表：事项、规则要求、后果或备注。\n\n语言风格：\n禁止使用“绝对红线、刚性护城河、不给价格虚高留任何死角、中选即触雷、全面压缩、强势倒逼、重大冲击、必然、显然、唯一选择、全国底价、实时联动”等模型化或营销化表达。请改用“报价上限、价格联动要求、企业需关注后续价格调整义务、不接受价格联动的可能影响对应产品中选资格、相关产品需按文件要求执行、以官方文件规定为准”等克制表达。\n\n公告 URL：\n{{#start_node.notice_url#}}\n\n输入材料如下：\n{{#conversation.source_evidence#}}\n\n历史知识摘要（可为空）：\n{{#conversation.history_insights#}}\n"
