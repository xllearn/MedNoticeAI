          text: "Generate a Chinese medical procurement analysis report from this evidence_pack.\n\nevidence_pack:\n{{#parse_evidence_pack.evidence_pack_json#}}\n\
            \nReturn this JSON shape exactly:\n{\n  \"version\": 1,\n  \"report_title\": \"\",\n  \"report_markdown\": \"\"\
