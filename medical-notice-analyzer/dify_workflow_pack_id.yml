        code: "def main(quality_text: str) -> dict:\n    import json\n    import re\n\n    def extract_json(text):\n     \
          \   text = (text or \"\").strip()\n        text = re.sub(r\"^```(?:json)?\\s*\", \"\", text)\n        text = re.sub(r\"\
          \\s*```$\", \"\", text)\n        if not text.startswith(\"{\"):\n            start = text.find(\"{\")\n        \
          \    end = text.rfind(\"}\")\n            if start >= 0 and end > start:\n                text = text[start:end\
          \ + 1]\n        return json.loads(text or \"{}\")\n\n    try:\n        data = extract_json(quality_text)\n    except\
          \ Exception as exc:\n        data = {\n            \"passed\": False,\n            \"round\": 1,\n            \"\
          issues\": [{\"issue_id\": \"Q_PARSE\", \"severity\": \"fatal\", \"problem_type\": \"quality_json_parse_failed\"\
          , \"report_text\": \"\", \"source_basis\": \"\", \"fix_instruction\": str(exc)}],\n            \"revision_instruction\"\
          : \"Quality node did not return valid JSON. Revise or review manually.\",\n        }\n    issues = data.get(\"issues\"\
