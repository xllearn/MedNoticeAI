    - data:
        desc: ''
        selected: false
        title: Parse Evidence Pack
        type: code
        code: "def main(fetch_body: str, pack_id: str) -> dict:\n    import json\n\n    raw = fetch_body or \"\"\n    try:\n\
          \        pack = json.loads(raw or \"{}\")\n    except Exception as exc:\n        return {\n            \"pack_ok\"\
          : \"false\",\n            \"pack_error\": \"evidence_pack response is not valid JSON: \" + str(exc),\n         \
          \   \"evidence_pack_json\": raw,\n            \"primary_count\": \"0\",\n            \"auxiliary_count\": \"0\"\
          ,\n        }\n\n    if not isinstance(pack, dict):\n        return {\n            \"pack_ok\": \"false\",\n    \
          \        \"pack_error\": \"evidence_pack is not a JSON object\",\n            \"evidence_pack_json\": raw,\n   \
          \         \"primary_count\": \"0\",\n            \"auxiliary_count\": \"0\",\n        }\n\n    primary = pack.get(\"\
          primary_materials\") or []\n    auxiliary = pack.get(\"auxiliary_materials\") or []\n    if not primary:\n     \
          \   return {\n            \"pack_ok\": \"false\",\n            \"pack_error\": \"evidence_pack has no primary_materials\"\
          ,\n            \"evidence_pack_json\": json.dumps(pack, ensure_ascii=False),\n            \"primary_count\": \"\
          0\",\n            \"auxiliary_count\": str(len(auxiliary)),\n        }\n\n    if pack_id and pack.get(\"pack_id\"\
          ) and str(pack.get(\"pack_id\")) != str(pack_id):\n        return {\n            \"pack_ok\": \"false\",\n     \
          \       \"pack_error\": \"input pack_id does not match evidence_pack.pack_id\",\n            \"evidence_pack_json\"\
          : json.dumps(pack, ensure_ascii=False),\n            \"primary_count\": str(len(primary)),\n            \"auxiliary_count\"\
          : str(len(auxiliary)),\n        }\n\n    return {\n        \"pack_ok\": \"true\",\n        \"pack_error\": \"\"\
          ,\n        \"evidence_pack_json\": json.dumps(pack, ensure_ascii=False),\n        \"primary_count\": str(len(primary)),\n\
          \        \"auxiliary_count\": str(len(auxiliary)),\n    }\n"
