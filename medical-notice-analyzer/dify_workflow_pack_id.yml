            : []\n}\n\nReport requirements:\n- Write report_title and report_markdown in Chinese.\n- Use Markdown in report_markdown.\n\
            - Primary materials decide title, lead, main facts, and analysis.\n- Auxiliary materials are only background or\
            \ comparison.\n- For metadata_only attachments, say only that attachment metadata exists and attachment full text\
            \ was not parsed.\n- Do not include the JSON object itself inside report_markdown."
        retry_config:
