        code: "def main(revision_text: str, previous_title: str, previous_report: str) -> dict:\n    import json\n    import\
          \ re\n\n    def extract_json(text):\n        text = (text or \"\").strip()\n        text = re.sub(r\"^```(?:json)?\\\
          s*\", \"\", text)\n        text = re.sub(r\"\\s*```$\", \"\", text)\n        if not text.startswith(\"{\"):\n  \
          \          start = text.find(\"{\")\n            end = text.rfind(\"}\")\n            if start >= 0 and end > start:\n\
          \                text = text[start:end + 1]\n        return json.loads(text or \"{}\")\n\n    try:\n        data\
          \ = extract_json(revision_text)\n    except Exception as exc:\n        data = {\n            \"version\": 2,\n \
          \           \"report_title\": previous_title or \"\",\n            \"report_markdown\": previous_report or \"\"\
          ,\n            \"fixed_issue_ids\": [],\n            \"revision_notes\": \"Revision node did not return valid JSON;\
          \ kept previous report: \" + str(exc),\n        }\n    if not isinstance(data, dict):\n        data = {}\n    data.setdefault(\"\
          version\", 2)\n    data.setdefault(\"report_title\", previous_title or \"\")\n    data.setdefault(\"report_markdown\"\
          , previous_report or \"\")\n    data.setdefault(\"fixed_issue_ids\", [])\n    data.setdefault(\"revision_notes\"\
          , \"\")\n    return {\n        \"revision_json\": json.dumps(data, ensure_ascii=False),\n        \"report_title\"\
          : str(data.get(\"report_title\") or \"\"),\n        \"report_markdown\": str(data.get(\"report_markdown\") or \"\
          \"),\n        \"version\": str(data.get(\"version\") or 2),\n        \"fixed_issue_ids_json\": json.dumps(data.get(\"\
