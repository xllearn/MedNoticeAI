          \    data.setdefault(\"report_markdown\", \"\")\n    data.setdefault(\"primary_material_ids\", [])\n    data.setdefault(\"\
          auxiliary_material_ids\", [])\n    data.setdefault(\"used_key_facts\", [])\n    data.setdefault(\"generation_warnings\"\
          , [])\n    return {\n        \"generation_json\": json.dumps(data, ensure_ascii=False),\n        \"report_title\"\
