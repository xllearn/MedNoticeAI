        code: "def main(quality_text: str) -> dict:\n    import json\n    import re\n\n    def extract_json(text):\n     \
          \   text = (text or \"\").strip()\n        text = re.sub(r\"^```(?:json)?\\s*\", \"\", text)\n        text = re.sub(r\"\
          \\s*```$\", \"\", text)\n        if not text.startswith(\"{\"):\n            start = text.find(\"{\")\n        \
          \    end = text.rfind(\"}\")\n            if start >= 0 and end > start:\n                text = text[start:end\
          \ + 1]\n        return json.loads(text or \"{}\")\n\n    try:\n        data = extract_json(quality_text)\n    except\
          \ Exception as exc:\n        data = {\n            \"passed\": False,\n            \"round\": 2,\n            \"\
          issues\": [{\"issue_id\": \"Q_PARSE\", \"severity\": \"fatal\", \"problem_type\": \"quality_json_parse_failed\"\
          , \"report_text\": \"\", \"source_basis\": \"\", \"fix_instruction\": str(exc)}],\n            \"revision_instruction\"\
          : \"Quality node did not return valid JSON. Revise or review manually.\",\n        }\n    issues = data.get(\"issues\"\
          ) if isinstance(data, dict) else []\n    if not isinstance(issues, list):\n        issues = []\n    severe = []\n\
          \    for issue in issues:\n        if not isinstance(issue, dict):\n            continue\n        severity = str(issue.get(\"\
          severity\") or \"\").lower()\n        if severity in {\"fatal\", \"high\", \"major\"}:\n            severe.append(issue)\n\
          \    passed = bool(data.get(\"passed\")) if isinstance(data, dict) else False\n    if passed:\n        route = \"\
          passed\"\n    elif severe:\n        route = \"revise\"\n    else:\n        route = \"minor_only\"\n    if isinstance(data,\
          \ dict):\n        data[\"issues\"] = issues\n    return {\n        \"quality_json\": json.dumps(data if isinstance(data,\
          \ dict) else {}, ensure_ascii=False),\n        \"issues_json\": json.dumps(issues, ensure_ascii=False),\n      \
          \  \"severe_issues_json\": json.dumps(severe, ensure_ascii=False),\n        \"revision_instruction\": str(data.get(\"\
          revision_instruction\") or \"\") if isinstance(data, dict) else \"\",\n        \"route\": route,\n    }\n"
