        title: Parse Generation JSON
        type: code
        code: "def main(generation_text: str) -> dict:\n    import json\n    import re\n\n    def extract_json(text):\n  \
          \      text = (text or \"\").strip()\n        text = re.sub(r\"^```(?:json)?\\s*\", \"\", text)\n        text =\
          \ re.sub(r\"\\s*```$\", \"\", text)\n        if not text.startswith(\"{\"):\n            start = text.find(\"{\"\
          )\n            end = text.rfind(\"}\")\n            if start >= 0 and end > start:\n                text = text[start:end\
          \ + 1]\n        return json.loads(text or \"{}\")\n\n    try:\n        data = extract_json(generation_text)\n  \
          \  except Exception as exc:\n        data = {\n            \"version\": 1,\n            \"report_title\": \"Report\
          \ generation failed\",\n            \"report_markdown\": \"Generation node did not return valid JSON: \" + str(exc),\n\
          \            \"primary_material_ids\": [],\n            \"auxiliary_material_ids\": [],\n            \"used_key_facts\"\
          : [],\n            \"generation_warnings\": [\"generation_json_parse_failed\"],\n        }\n\n    if not isinstance(data,\
