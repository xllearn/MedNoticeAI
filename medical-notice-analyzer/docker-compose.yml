services:
  medical-notice-analyzer:
    build: .
    container_name: medical-notice-analyzer
    environment:
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://192.168.34.88:8099}
      DB_HOST: ${DB_HOST:-192.168.36.36}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-wangfanqi_test}
      DB_USER: ${DB_USER:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_CHARSET: ${DB_CHARSET:-utf8mb4}
      REPORT_DIR: ${REPORT_DIR:-/tmp/medical-notice-reports}
      SITE_CACHE_DIR: ${SITE_CACHE_DIR:-/app/site-cache}
      EVIDENCE_CACHE_DIR: ${EVIDENCE_CACHE_DIR:-/app/.cache/evidence}
      EVIDENCE_PACK_DIR: ${EVIDENCE_PACK_DIR:-/app/data/evidence_packs}
      ANALYSIS_RUN_DIR: ${ANALYSIS_RUN_DIR:-/app/data/analysis_runs}
      DIFY_BASE_URL: ${DIFY_BASE_URL:-http://192.168.34.86/v1}
      DIFY_WORKFLOW_API_KEY: ${DIFY_WORKFLOW_API_KEY:-}
      DIFY_REPORT_WORKFLOW_ENDPOINT: ${DIFY_REPORT_WORKFLOW_ENDPOINT:-/workflows/run}
      DIFY_RESPONSE_MODE: ${DIFY_RESPONSE_MODE:-blocking}
      DIFY_USER: ${DIFY_USER:-analysis_frontend}
      DIFY_TIMEOUT_SECONDS: ${DIFY_TIMEOUT_SECONDS:-600}
      REPORT_RETENTION_HOURS: ${REPORT_RETENTION_HOURS:-168}
      ATTACHMENT_CONCURRENCY: ${ATTACHMENT_CONCURRENCY:-4}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DISCLAIMER_SEPARATE_PAGE: ${DISCLAIMER_SEPARATE_PAGE:-false}
      ENABLE_ATTACHMENT_DOWNLOAD: ${ENABLE_ATTACHMENT_DOWNLOAD:-true}
      ENABLE_ATTACHMENT_PARSE: ${ENABLE_ATTACHMENT_PARSE:-true}
      ATTACHMENT_DOWNLOAD_BASE_URL: ${ATTACHMENT_DOWNLOAD_BASE_URL:-https://qx.eliancloud.cn/Common/EmailFileDownLoad?AttID=}
      ATTACHMENT_TEMP_DIR: ${ATTACHMENT_TEMP_DIR:-/tmp/medical_notice_attachments}
      ATTACHMENT_MAX_DOWNLOAD_MB: ${ATTACHMENT_MAX_DOWNLOAD_MB:-50}
      ATTACHMENT_MAX_PARSE_MB: ${ATTACHMENT_MAX_PARSE_MB:-30}
      ATTACHMENT_REQUEST_TIMEOUT: ${ATTACHMENT_REQUEST_TIMEOUT:-60}
      ATTACHMENT_COOKIE: ${ATTACHMENT_COOKIE:-}
      ATTACHMENT_HEADERS_JSON: ${ATTACHMENT_HEADERS_JSON:-}
      ENABLE_ATTACHMENT_PARSE_CACHE: ${ENABLE_ATTACHMENT_PARSE_CACHE:-true}
      ATTACHMENT_PARSE_CACHE_DIR: ${ATTACHMENT_PARSE_CACHE_DIR:-/app/data/attachment_parse_cache}
      ATTACHMENT_PARSE_CACHE_SUCCESS_TTL_DAYS: ${ATTACHMENT_PARSE_CACHE_SUCCESS_TTL_DAYS:-30}
      ATTACHMENT_PARSE_CACHE_FAILURE_TTL_MINUTES: ${ATTACHMENT_PARSE_CACHE_FAILURE_TTL_MINUTES:-10}
      ATTACHMENT_PARSE_CACHE_PARSE_FAILURE_TTL_MINUTES: ${ATTACHMENT_PARSE_CACHE_PARSE_FAILURE_TTL_MINUTES:-30}
      ATTACHMENT_PARSE_CACHE_MAX_MB: ${ATTACHMENT_PARSE_CACHE_MAX_MB:-500}
      ATTACHMENT_PARSE_CACHE_CLEANUP_ON_START: ${ATTACHMENT_PARSE_CACHE_CLEANUP_ON_START:-true}
      ENABLE_USER_FEEDBACK_REVISION: ${ENABLE_USER_FEEDBACK_REVISION:-true}
      ENABLE_ANALYSIS_HIGHLIGHT: ${ENABLE_ANALYSIS_HIGHLIGHT:-true}
      ELIAN_QX_TOKEN: ${ELIAN_QX_TOKEN:-}
      ELIAN_QX_COOKIE: ${ELIAN_QX_COOKIE:-}
    ports:
      - "8099:8099"
    volumes:
      - ./reports:/tmp/medical-notice-reports
      - ./site-cache:/app/site-cache
      - ./data:/app/data
    restart: unless-stopped
